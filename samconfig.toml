version = 0.1

# Default config = production. `sam deploy` with no flags deploys here.
[default.deploy.parameters]
stack_name = "well-done"
resolve_s3 = true
s3_prefix = "well-done"
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
disable_rollback = false
# AllowedOrigins is pinned here (not just defaulted in template.yaml) because
# CloudFormation reuses the previously deployed parameter value when a param
# isn't explicitly overridden — so changes to the template Default get silently
# ignored on subsequent deploys. List value is wrapped in double quotes so the
# SAM CLI tokenizer treats the comma-delimited list as one opaque value.
parameter_overrides = 'AppName=well-done Env=prod AllowedOrigins="https://welldonestudent.com,https://www.welldonestudent.com,https://d3ck42g5jjmjbj.cloudfront.net,https://localhost"'
image_repositories = []

[default.global.parameters]
region = "us-east-1"

# Dev stack: `sam deploy --config-env dev` to deploy isolated dev resources
# (separate DynamoDB table, buckets, user pool, alarms) under the same AWS
# account in us-east-1. Use a different AlertEmail or unsubscribe the prod one
# from the dev SNS topic if you don't want dev alerts.
[dev.deploy.parameters]
stack_name = "well-done-dev"
resolve_s3 = true
s3_prefix = "well-done-dev"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
disable_rollback = false
parameter_overrides = 'AppName=well-done Env=dev AllowedOrigins="https://welldonestudent.com,https://www.welldonestudent.com,https://d3ck42g5jjmjbj.cloudfront.net,https://localhost"'
image_repositories = []

[dev.global.parameters]
region = "us-east-1"
