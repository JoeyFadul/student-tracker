AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Well Done - elementary student reward tracker

Parameters:
  AppName:
    Type: String
    Default: student-tracker
    Description: Prefix for resource names.
  Env:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]
    Description: >-
      Environment suffix for resource names. "prod" keeps the original names
      so existing data is preserved; "dev" adds a -dev suffix so a parallel
      stack can be deployed without colliding.
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "https://welldonestudent.com,https://www.welldonestudent.com,https://d3ck42g5jjmjbj.cloudfront.net,capacitor://localhost"
    Description: >-
      Origins permitted by the photo bucket CORS only. capacitor://localhost
      covers the iOS native build (Capacitor's default scheme). The API
      Gateway HTTP API CORS uses a separate wildcard ('*') below since API
      Gateway rejects non-http(s) schemes; auth is enforced via JWT on every
      route so the wildcard is acceptable. Add http://localhost:5173 here for
      dev when running vite directly against the photo bucket.
  AlertEmail:
    Type: String
    Default: joefadul@gmail.com
    Description: Email address subscribed to the CloudWatch alarms SNS topic.
  CustomDomainCertArn:
    Type: String
    Default: "arn:aws:acm:us-east-1:573849277857:certificate/601c7b30-1bdc-45ab-b49b-8ad66103cc75"
    Description: >-
      ACM certificate ARN (must be in us-east-1) for the CloudFront custom
      domain. Leave blank to use the default *.cloudfront.net certificate.
  CustomDomainAliases:
    Type: CommaDelimitedList
    Default: "welldonestudent.com,www.welldonestudent.com"
    Description: Aliases on the CloudFront distribution. Leave empty list if no custom domain.

Conditions:
  IsProd: !Equals [!Ref Env, prod]
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainCertArn, ""]]

Resources:
  # ===== DATA: DynamoDB single-table =====
  StudentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !If [IsProd, !Sub "${AppName}-data", !Sub "${AppName}-${Env}-data"]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ===== PHOTOS: S3 bucket =====
  # Private bucket. All access goes through the Lambda, which issues short-lived
  # presigned PUT urls for uploads and presigned GET urls for reads. The bucket
  # is never publicly readable.
  PhotoBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [IsProd, !Sub "${AppName}-photos-${AWS::AccountId}", !Sub "${AppName}-${Env}-photos-${AWS::AccountId}"]
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Ref AllowedOrigins
            AllowedMethods: [PUT]
            AllowedHeaders: ['*']
            ExposedHeaders: [ETag]
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
        BlockPublicAcls: true
        IgnorePublicAcls: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # ===== AUTH: Cognito user pool =====
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !If [IsProd, !Sub "${AppName}-teachers", !Sub "${AppName}-${Env}-teachers"]
      AdminCreateUserConfig:
        # Self-serve signup is on — anyone can create an account via the
        # public Cognito SignUp API. AutoVerifiedAttributes below requires
        # the user to confirm their email with a code before the account
        # can sign in, so spam accounts can't actually do anything.
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      UsernameAttributes:
        - email
      # AdvancedSecurityMode requires Cognito PLUS pricing tier ($0.015/MAU).
      # Re-enable by setting UserPoolTier: PLUS and adding:
      #   UserPoolAddOns:
      #     AdvancedSecurityMode: AUDIT
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !If [IsProd, !Sub "${AppName}-web", !Sub "${AppName}-${Env}-web"]
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # ===== API: Lambda + HTTP API =====
  # NOTE: CORS preflight (OPTIONS) is handled automatically by the HTTP API's
  # CorsConfiguration BEFORE the JWT authorizer runs. This is why we don't
  # need a separate OPTIONS route - API Gateway responds to preflight requests
  # itself, no Lambda invocation, no auth check.
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !If [IsProd, !Sub "${AppName}-api", !Sub "${AppName}-${Env}-api"]
      CodeUri: backend/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref StudentsTable
          PHOTO_BUCKET: !Ref PhotoBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudentsTable
        # GetObject is needed to *sign* GET URLs even though the Lambda never
        # reads object bytes itself; PutObject for upload presigning.
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub ${PhotoBucket.Arn}/*
      Events:
        # Authenticated routes - JWT required
        ApiEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        # CORS preflight - explicitly NO auth
        CorsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !If [IsProd, !Sub "${AppName}-api", !Sub "${AppName}-${Env}-api"]
      # Account-level default is 10k req/s burst — way too high for this app.
      # Per-route throttling caps any single client's blast radius.
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      CorsConfiguration:
        # Wildcard origin because:
        # 1. API Gateway HTTP API rejects non-http(s) origins (no way to
        #    allow capacitor://localhost from the iOS native shell).
        # 2. Every route requires a Cognito JWT, so CORS isn't the auth
        #    boundary — this is standard for token-authenticated APIs.
        # AllowCredentials is unset so the wildcard is accepted by browsers.
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        MaxAge: 300
      Auth:
        Authorizers:
          CognitoAuth:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuth

  # ===== FRONTEND: S3 + CloudFront =====
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [IsProd, !Sub "${AppName}-web-${AWS::AccountId}", !Sub "${AppName}-${Env}-web-${AWS::AccountId}"]

  # ===== WAF =====
  # CLOUDFRONT-scope WAF ACLs must live in us-east-1 (we already are).
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !If [IsProd, !Sub "${AppName}-web-acl", !Sub "${AppName}-${Env}-web-acl"]
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !If [IsProd, !Sub "${AppName}-web-acl", !Sub "${AppName}-${Env}-web-acl"]
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet
        - Name: RateLimit
          Priority: 2
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimit

  WebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AppName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebSecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub ${AppName}-security-headers
        Comment: HSTS, CSP, COOP, no-referrer, X-Content-Type-Options for the SPA.
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: no-referrer
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: >-
              default-src 'self';
              img-src 'self' data: https://*.s3.amazonaws.com https://*.s3.us-east-1.amazonaws.com;
              script-src 'self';
              style-src 'self' 'unsafe-inline';
              connect-src 'self' https://*.execute-api.us-east-1.amazonaws.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-identity.us-east-1.amazonaws.com;
              font-src 'self' data:;
              object-src 'none';
              base-uri 'self';
              frame-ancestors 'none';
              form-action 'self';
              upgrade-insecure-requests
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Cross-Origin-Opener-Policy
              Value: same-origin
              Override: true
            - Header: Permissions-Policy
              Value: "camera=(), microphone=(), geolocation=(), interest-cohort=()"
              Override: true

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        WebACLId: !GetAtt WebAcl.Arn
        Aliases: !If [HasCustomDomain, !Ref CustomDomainAliases, !Ref AWS::NoValue]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CustomDomainCertArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt WebOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref WebSecurityHeadersPolicy
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${WebBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}

  # ===== ALARMS =====
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !If [IsProd, !Sub "${AppName}-alerts", !Sub "${AppName}-${Env}-alerts"]
      DisplayName: !If [IsProd, !Sub "${AppName} alerts", !Sub "${AppName} ${Env} alerts"]

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If [IsProd, !Sub "${AppName}-lambda-errors", !Sub "${AppName}-${Env}-lambda-errors"]
      AlarmDescription: API Lambda is throwing errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  LambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If [IsProd, !Sub "${AppName}-lambda-throttles", !Sub "${AppName}-${Env}-lambda-throttles"]
      AlarmDescription: API Lambda is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  ApiServerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If [IsProd, !Sub "${AppName}-api-5xx", !Sub "${AppName}-${Env}-api-5xx"]
      AlarmDescription: HTTP API is returning 5XX responses
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  DynamoUserErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If [IsProd, !Sub "${AppName}-dynamo-user-errors", !Sub "${AppName}-${Env}-dynamo-user-errors"]
      AlarmDescription: DynamoDB client/validation errors
      Namespace: AWS/DynamoDB
      MetricName: UserErrors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  DynamoSystemErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If [IsProd, !Sub "${AppName}-dynamo-system-errors", !Sub "${AppName}-${Env}-dynamo-system-errors"]
      AlarmDescription: DynamoDB server-side errors against the data table
      Namespace: AWS/DynamoDB
      MetricName: SystemErrors
      Dimensions:
        - Name: TableName
          Value: !Ref StudentsTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

Outputs:
  AppURL:
    Description: Open this in your browser
    Value: !Sub https://${WebDistribution.DomainName}
  ApiURL:
    Description: API endpoint (set as VITE_API_URL in frontend .env)
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Description: Cognito User Pool ID (set as VITE_USER_POOL_ID)
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID (set as VITE_USER_POOL_CLIENT_ID)
    Value: !Ref UserPoolClient
  WebBucketName:
    Description: S3 bucket for frontend (upload dist/ contents here)
    Value: !Ref WebBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidations)
    Value: !Ref WebDistribution