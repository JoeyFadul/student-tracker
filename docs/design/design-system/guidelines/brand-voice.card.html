<!-- @dsCard group="Brand" viewport="700x180" name="Voice" subtitle="Calm, plain, teacher-to-teacher; sentence case; positive-first" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px 24px;display:flex;gap:16px">
<div style="flex:1;display:flex;flex-direction:column;gap:8px">
<div style="font-size:11px;color:var(--wd-success);font-weight:700;text-transform:uppercase;letter-spacing:0.6px">Yes</div>
<div style="font-size:14px;background:var(--wd-surface);border:1px solid var(--wd-border);border-radius:12px;padding:9px 12px">Recognize positive behavior in seconds.</div>
<div style="font-size:14px;background:var(--wd-surface);border:1px solid var(--wd-border);border-radius:12px;padding:9px 12px">Made a mistake? Undo from the toast.</div>
<div style="font-size:14px;background:var(--wd-surface);border:1px solid var(--wd-border);border-radius:12px;padding:9px 12px">No active school year</div>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px">
<div style="font-size:11px;color:var(--wd-danger);font-weight:700;text-transform:uppercase;letter-spacing:0.6px">No</div>
<div style="font-size:14px;background:var(--wd-surface-alt);border-radius:12px;padding:9px 12px;color:var(--wd-text-muted);text-decoration:line-through">Awesome!! 🎉 Points Added!</div>
<div style="font-size:14px;background:var(--wd-surface-alt);border-radius:12px;padding:9px 12px;color:var(--wd-text-muted);text-decoration:line-through">OOPS! Something Went Wrong</div>
<div style="font-size:14px;background:var(--wd-surface-alt);border-radius:12px;padding:9px 12px;color:var(--wd-text-muted);text-decoration:line-through">We've Updated Your Classroom</div>
</div>
</body></html>
