<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Subtle neutral-ink layers; orange glow reserved for the FAB" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:24px;display:flex;align-items:center;gap:20px">
<div style="width:110px;height:90px;background:var(--wd-surface);border:1px solid var(--wd-border);border-radius:16px;box-shadow:var(--wd-shadow-sm);display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--wd-text-muted)">sm · cards</div>
<div style="width:110px;height:90px;background:var(--wd-surface);border-radius:16px;box-shadow:var(--wd-shadow-md);display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--wd-text-muted)">md · tiles</div>
<div style="width:110px;height:90px;background:var(--wd-surface);border-radius:16px;box-shadow:var(--wd-shadow-lg);display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--wd-text-muted)">lg · toasts</div>
<div style="width:56px;height:56px;background:var(--wd-accent);border-radius:28px;box-shadow:var(--wd-shadow-fab);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:300">+</div>
<div style="font-size:12px;color:var(--wd-text-muted);line-height:1.5;max-width:170px">fab · 0 6px 20px rgba(224,91,53,.32) — the only colored shadow</div>
</body></html>
